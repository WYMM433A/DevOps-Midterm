version: '3.8'

services:
  web:
    image: akh2100/midterm-app:v1
    container_name: midterm-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://database:27017/products_db
      - PORT=3000
    depends_on:
      - database
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    networks:
      - app-network

  database:
    image: mongo:7.0
    container_name: midterm-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

volumes:
  mongo_data:
  uploads_data:

networks:
  app-network:
    driver: bridge

---

## Summary of How Everything Connects

DockerSetup.sh runs
      ↓
Installs Docker + Nginx + Certbot
      ↓
Stops native MongoDB (fixes port conflict)
      ↓
docker compose pull → downloads images from Docker Hub
      ↓
docker compose up -d → starts two containers:
      ├── midterm-web (Node.js app on port 3000)
      └── midterm-mongo (MongoDB, internal only)
            ↓
Both containers on same app-network
midterm-web connects to midterm-mongo via service name "database"
      ↓
Nginx configured → forwards port 80/443 → port 3000
      ↓
Certbot → gets SSL certificate → HTTPS enabled
      ↓
https://wymm.online → Nginx → Docker web container → Docker MongoDB